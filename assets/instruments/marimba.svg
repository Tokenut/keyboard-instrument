<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- 马林巴 (一排木质音板 + 共鸣管 + 琴槌) -->
  <defs>
    <linearGradient id="marBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0a664"/><stop offset="100%" stop-color="#a86a30"/>
    </linearGradient>
    <linearGradient id="marTube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a8a95"/><stop offset="50%" stop-color="#c5c5cf"/><stop offset="100%" stop-color="#6a6a75"/>
    </linearGradient>
  </defs>
  <ellipse cx="200" cy="355" rx="160" ry="18" fill="#000" opacity="0.3"/>
  <!-- 框架 -->
  <path d="M64 150 L336 130 L344 180 L72 200 Z" fill="#3d2a52" stroke="#241a3a" stroke-width="2"/>
  <!-- 音板(从左到右渐小, 模拟音高) -->
  <g stroke="#7a4a1a" stroke-width="1.2">
    <rect x="82"  y="150" width="30" height="46" rx="4" fill="url(#marBar)"/>
    <rect x="118" y="147" width="30" height="43" rx="4" fill="url(#marBar)"/>
    <rect x="154" y="144" width="30" height="41" rx="4" fill="url(#marBar)"/>
    <rect x="190" y="141" width="30" height="39" rx="4" fill="url(#marBar)"/>
    <rect x="226" y="138" width="30" height="37" rx="4" fill="url(#marBar)"/>
    <rect x="262" y="135" width="30" height="35" rx="4" fill="url(#marBar)"/>
    <rect x="298" y="132" width="30" height="33" rx="4" fill="url(#marBar)"/>
  </g>
  <!-- 音板高光 -->
  <g fill="#f5d5a8" opacity="0.5">
    <rect x="86" y="154" width="22" height="6" rx="3"/><rect x="122" y="151" width="22" height="6" rx="3"/>
    <rect x="194" y="145" width="22" height="6" rx="3"/><rect x="266" y="139" width="22" height="6" rx="3"/>
  </g>
  <!-- 共鸣管(垂在下方, 长短不一) -->
  <g stroke="#4a4a55" stroke-width="1">
    <rect x="90"  y="200" width="14" height="90" rx="7" fill="url(#marTube)"/>
    <rect x="126" y="194" width="14" height="80" rx="7" fill="url(#marTube)"/>
    <rect x="162" y="188" width="14" height="72" rx="7" fill="url(#marTube)"/>
    <rect x="198" y="184" width="14" height="64" rx="7" fill="url(#marTube)"/>
    <rect x="234" y="178" width="14" height="56" rx="7" fill="url(#marTube)"/>
    <rect x="270" y="173" width="14" height="50" rx="7" fill="url(#marTube)"/>
    <rect x="306" y="168" width="14" height="44" rx="7" fill="url(#marTube)"/>
  </g>
  <!-- 腿 -->
  <path d="M90 195 L84 330 L96 330 L100 200 Z" fill="#241a3a" stroke="#1a1330" stroke-width="1.5"/>
  <path d="M320 170 L326 330 L338 330 L332 178 Z" fill="#241a3a" stroke="#1a1330" stroke-width="1.5"/>
  <!-- 琴槌 -->
  <g>
    <line x1="230" y1="120" x2="300" y2="90" stroke="#8a6a4a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="228" cy="121" r="12" fill="#e8b84b" stroke="#b8892a" stroke-width="1.5"/>
    <line x1="250" y1="128" x2="320" y2="102" stroke="#8a6a4a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="248" cy="129" r="12" fill="#c77dff" stroke="#8a5ac0" stroke-width="1.5"/>
  </g>
</svg>
