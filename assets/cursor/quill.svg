<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- 羽毛笔 quill · 柔和翎羽造型 -->
  <defs>
    <linearGradient id="featherBody" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
      <stop offset="0%" stop-color="#fefaf0"/>
      <stop offset="45%" stop-color="#f5e9cf"/>
      <stop offset="100%" stop-color="#d9c49a"/>
    </linearGradient>
    <linearGradient id="featherShaft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b89b6a"/>
      <stop offset="100%" stop-color="#6e5636"/>
    </linearGradient>
  </defs>

  <!-- 羽毛外轮廓(叶片状, 上宽下窄) -->
  <path d="M 50 6
           C 40 8, 28 16, 20 30
           C 15 39, 12 47, 12 52
           C 20 50, 30 44, 38 32
           C 45 22, 49 13, 50 6 Z"
        fill="url(#featherBody)" stroke="#c9b07a" stroke-width="0.6"/>
  <!-- 羽毛边缘的翎羽分叉(左侧) -->
  <g stroke="#e9d7b0" stroke-width="0.8" fill="none" opacity="0.9">
    <path d="M 44 14 C 39 16, 35 20, 32 25"/>
    <path d="M 40 20 C 34 22, 30 27, 27 32"/>
    <path d="M 35 27 C 29 29, 24 34, 21 40"/>
    <path d="M 29 35 C 24 37, 19 42, 16 47"/>
  </g>
  <!-- 羽毛边缘的翎羽分叉(右侧) -->
  <g stroke="#e9d7b0" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 47 12 C 48 18, 47 24, 44 30"/>
    <path d="M 43 18 C 44 24, 42 30, 39 35"/>
  </g>

  <!-- 中轴(羽轴) 从羽尖延伸到笔尖 -->
  <path d="M 49 8 C 36 18, 24 34, 12 52 L 8 58"
        fill="none" stroke="url(#featherShaft)" stroke-width="2" stroke-linecap="round"/>

  <!-- 笔尖(金属笔头 + 墨点) -->
  <path d="M 12 52 L 6 59 L 11 56 Z" fill="#3a2c55"/>
  <circle cx="7" cy="58.5" r="1.4" fill="#1a1030"/>
</svg>
